<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SmartRoute Agent — AI 智能路线规划</title>
<style>
:root {
  --bg-deep:#080c14;--bg-surface:#0e1220;--bg-card:rgba(16,20,35,0.85);
  --border-subtle:rgba(255,255,255,0.05);--border-card:rgba(255,255,255,0.08);
  --border-active:rgba(212,175,55,0.35);--text-primary:#e6e4e0;--text-secondary:#9498a4;
  --text-muted:#5d6170;--gold:#d4af37;--gold-light:#f0d060;--gold-bg:rgba(212,175,55,0.08);
  --gold-border:rgba(212,175,55,0.18);--blue:#5b9bd5;--blue-bg:rgba(91,155,213,0.08);
  --green:#3cb878;--red:#e0556a;--purple:#9b7ed8;--purple-bg:rgba(155,126,216,0.08);
  --radius-sm:6px;--radius-md:12px;--radius-lg:18px;--radius-xl:24px;
  --shadow-sm:0 2px 12px rgba(0,0,0,0.3);--shadow-md:0 4px 24px rgba(0,0,0,0.4);
  --transition:0.25s cubic-bezier(0.4,0,0.2,1);
  --font:'Inter','PingFang SC','Microsoft YaHei',system-ui,sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg-deep);color:var(--text-primary);height:100vh;overflow:hidden;-webkit-font-smoothing:antialiased}
.bg-layer{position:fixed;inset:0;pointer-events:none;z-index:0}
.bg-orb{position:absolute;border-radius:50%;filter:blur(140px);opacity:.06}
.bg-orb-1{width:700px;height:700px;background:var(--gold);top:-250px;right:-150px;animation:float1 22s ease-in-out infinite}
.bg-orb-2{width:500px;height:500px;background:var(--blue);bottom:-200px;left:-100px;animation:float2 26s ease-in-out infinite reverse}
.bg-orb-3{width:400px;height:400px;background:var(--purple);top:50%;left:50%;transform:translate(-50%,-50%);animation:pulse 9s ease-in-out infinite}
@keyframes float1{0%,100%{transform:translate(0,0)}33%{transform:translate(-80px,60px)}66%{transform:translate(50px,-40px)}}
@keyframes float2{0%,100%{transform:translate(0,0)}33%{transform:translate(60px,-50px)}66%{transform:translate(-40px,30px)}}
@keyframes pulse{0%,100%{transform:translate(-50%,-50%)scale(1);opacity:.04}50%{transform:translate(-50%,-50%)scale(1.4);opacity:.1}}
.app{position:relative;z-index:1;display:flex;flex-direction:column;height:100vh;max-width:960px;margin:0 auto}
.header{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:18px 24px}
.logo{display:flex;align-items:center;gap:10px;font-size:19px;font-weight:700}
.logo-diamond{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--gold),#b8860b);display:flex;align-items:center;justify-content:center;font-size:17px;box-shadow:0 4px 16px rgba(212,175,55,.25)}
.logo-highlight{color:var(--gold)}.header-badge{font-size:11px;padding:4px 12px;border-radius:20px;font-weight:600;background:var(--gold-bg);color:var(--gold-light);border:1px solid var(--gold-border)}
.chat{flex:1;overflow-y:auto;padding:8px 24px 24px;display:flex;flex-direction:column;gap:6px}
.chat::-webkit-scrollbar{width:4px}.chat::-webkit-scrollbar-track{background:transparent}.chat::-webkit-scrollbar-thumb{background:rgba(255,255,255,.06);border-radius:2px}
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;text-align:center;gap:12px;opacity:0;transform:translateY(20px);animation:welcomeIn .6s .1s forwards}
@keyframes welcomeIn{to{opacity:1;transform:translateY(0)}}
.welcome-icon{font-size:52px;opacity:.5}.welcome-title{font-size:22px;font-weight:700}
.welcome-sub{font-size:14px;color:var(--text-muted);max-width:380px;line-height:1.7}
.welcome-chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:8px}
.welcome-chip{font-size:12px;padding:8px 16px;border-radius:20px;background:rgba(255,255,255,.02);border:1px solid var(--border-card);color:var(--text-secondary);cursor:pointer;transition:all var(--transition)}
.welcome-chip:hover{background:rgba(255,255,255,.05);color:var(--text-primary);border-color:rgba(255,255,255,.15)}
.msg{display:flex;gap:12px;max-width:100%;animation:msgIn .35s ease-out forwards;opacity:0;transform:translateY(12px)}
@keyframes msgIn{to{opacity:1;transform:translateY(0)}}
.msg-user{flex-direction:row-reverse}.msg-user .msg-bubble{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:var(--radius-lg) var(--radius-lg) 4px var(--radius-lg)}
.msg-agent{align-items:flex-start}.msg-agent .msg-bubble{background:transparent;border:none;padding-left:0}
.msg-avatar{width:32px;height:32px;border-radius:var(--radius-sm);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px}
.msg-agent .msg-avatar{background:linear-gradient(135deg,var(--gold),#b8860b);box-shadow:0 2px 10px rgba(212,175,55,.2)}
.msg-user .msg-avatar{background:rgba(255,255,255,.08)}
.msg-bubble{max-width:85%;padding:12px 16px;border-radius:var(--radius-lg) var(--radius-lg) var(--radius-lg) 4px;font-size:14px;line-height:1.65}
.msg-user .msg-bubble{color:var(--text-primary)}
.msg-agent .msg-content{width:100%}
.stage-msg{display:flex;align-items:center;gap:10px;padding:10px 14px;font-size:13px}
.stage-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;background:var(--gold);box-shadow:0 0 10px rgba(212,175,55,.5);animation:dotPulse 2s ease-in-out infinite}
@keyframes dotPulse{0%,100%{box-shadow:0 0 6px rgba(212,175,55,.3)}50%{box-shadow:0 0 18px rgba(212,175,55,.8)}}
.stage-dot.done{animation:none;background:var(--green);box-shadow:0 0 6px rgba(60,184,120,.3)}
.stage-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;padding:2px 8px;border-radius:4px;flex-shrink:0}
.stage-label.intent{background:var(--gold-bg);color:var(--gold-light)}
.stage-label.retrieval{background:var(--blue-bg);color:var(--blue)}
.stage-label.ugc{background:var(--purple-bg);color:var(--purple)}
.stage-label.route{background:rgba(26,188,156,.1);color:#1abc9c}
.stage-label.presentation{background:rgba(60,184,120,.1);color:var(--green)}
.stage-text{color:var(--text-secondary);font-size:13px}
.intent-card{background:var(--bg-card);border:1px solid var(--border-card);border-radius:var(--radius-md);padding:14px 16px;margin-top:8px;backdrop-filter:blur(12px)}
.intent-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px}
.intent-item{font-size:12px}.intent-item .key{color:var(--text-muted);font-size:10px;text-transform:uppercase;letter-spacing:.8px;margin-bottom:2px}.intent-item .val{color:var(--text-primary);font-weight:500}
.poi-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:8px;margin-top:8px}
.poi-chip{display:flex;align-items:center;gap:8px;padding:8px 12px;background:rgba(255,255,255,.02);border:1px solid var(--border-subtle);border-radius:var(--radius-sm);font-size:12px;transition:all var(--transition)}
.poi-chip:hover{background:rgba(255,255,255,.04)}.poi-chip .poi-name{font-weight:500}.poi-chip .poi-cat{color:var(--text-muted);font-size:11px}.poi-chip .poi-rating{color:var(--gold-light);margin-left:auto;font-size:11px}
.insights-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:10px;margin-top:8px}
.insight-card{background:var(--bg-card);border:1px solid var(--border-card);border-radius:var(--radius-md);padding:14px;backdrop-filter:blur(12px);transition:all var(--transition)}
.insight-card:hover{border-color:rgba(255,255,255,.12)}
.insight-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.insight-name{font-size:13px;font-weight:600}
.insight-channel{font-size:9px;padding:2px 6px;border-radius:3px;font-weight:700;letter-spacing:.8px}
.insight-channel.llm{background:var(--purple-bg);color:var(--purple)}.insight-channel.nlp{background:var(--blue-bg);color:var(--blue)}
.insight-row{font-size:11px;line-height:1.6;margin-top:4px}.insight-high{color:var(--green)}.insight-warn{color:var(--red)}
.plan-card{background:var(--bg-card);border:1px solid var(--border-card);border-radius:var(--radius-lg);padding:20px;backdrop-filter:blur(16px);transition:all var(--transition);margin-top:12px}
.plan-card:hover{border-color:rgba(255,255,255,.12);box-shadow:var(--shadow-md);transform:translateY(-2px)}
.plan-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.plan-badge{font-size:10px;font-weight:700;padding:3px 10px;border-radius:10px;letter-spacing:1px}
.plan-badge.a{background:var(--gold-bg);color:var(--gold-light)}.plan-badge.b{background:var(--blue-bg);color:var(--blue)}.plan-badge.c{background:var(--purple-bg);color:var(--purple)}
.plan-name{font-size:18px;font-weight:700}.plan-tagline{font-size:12px;color:var(--text-secondary);margin-bottom:14px}
.plan-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.plan-stat{padding:8px 10px;background:rgba(255,255,255,.015);border-radius:var(--radius-sm);text-align:center}.plan-stat .v{font-size:15px;font-weight:600}.plan-stat .l{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.8px}
.plan-timeline{position:relative;padding-left:18px}.plan-timeline::before{content:'';position:absolute;left:4px;top:4px;bottom:4px;width:2px;background:linear-gradient(to bottom,var(--gold),rgba(212,175,55,.08))}
.tl-item{position:relative;margin-bottom:14px}.tl-item:last-child{margin-bottom:0}
.tl-dot{position:absolute;left:-18px;top:4px;width:10px;height:10px;border-radius:50%;background:var(--bg-deep);border:2px solid var(--gold)}
.tl-time{font-size:11px;font-weight:600;color:var(--gold)}.tl-poi{font-size:13px;font-weight:600}.tl-cat{font-size:10px;color:var(--text-muted)}.tl-reason{font-size:11px;color:var(--text-secondary);font-style:italic;margin-top:3px;line-height:1.5}.tl-warn{font-size:10px;color:var(--red);margin-top:2px}
.compact-comp{width:100%;font-size:11px;border-collapse:collapse;margin-top:12px}
.compact-comp td,.compact-comp th{padding:6px 10px;text-align:left;border-bottom:1px solid var(--border-subtle)}.compact-comp th{color:var(--text-muted);font-weight:500;font-size:10px;text-transform:uppercase;letter-spacing:.8px}
.hints-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}.hint{font-size:10px;padding:5px 12px;border-radius:16px;background:var(--gold-bg);border:1px solid var(--gold-border);color:var(--gold-light)}
.input-area{flex-shrink:0;padding:16px 24px 20px;position:relative}
.input-wrapper{display:flex;align-items:flex-end;gap:10px;background:var(--bg-surface);border:1px solid var(--border-card);border-radius:var(--radius-xl);padding:8px 8px 8px 18px;transition:all var(--transition);backdrop-filter:blur(12px)}
.input-wrapper:focus-within{border-color:var(--border-active);box-shadow:0 0 0 4px rgba(212,175,55,.05)}
.chat-input{flex:1;background:0;border:0;outline:0;color:var(--text-primary);font-family:var(--font);font-size:14px;line-height:1.5;resize:none;max-height:120px;padding:6px 0}.chat-input::placeholder{color:var(--text-muted)}
.send-btn{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--gold),#b8860b);border:0;color:#1a1a1a;font-size:16px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all var(--transition);box-shadow:0 2px 12px rgba(212,175,55,.2)}
.send-btn:hover{transform:scale(1.05)}.send-btn:disabled{opacity:.3;cursor:not-allowed;transform:none}
.typing{display:flex;align-items:center;gap:12px;padding:10px 0;animation:msgIn .3s ease-out}
.typing-dots{display:flex;gap:4px}.typing-dots span{width:6px;height:6px;border-radius:50%;background:var(--gold);animation:typingBounce 1.4s ease-in-out infinite}.typing-dots span:nth-child(2){animation-delay:.2s}.typing-dots span:nth-child(3){animation-delay:.4s}@keyframes typingBounce{0%,80%,100%{opacity:.3;transform:translateY(0)}40%{opacity:1;transform:translateY(-6px)}}
.toast{position:fixed;top:20px;right:20px;z-index:100;padding:12px 20px;border-radius:var(--radius-md);font-size:13px;box-shadow:var(--shadow-md);animation:toastIn .3s ease-out;pointer-events:none}.toast.success{background:rgba(60,184,120,.15);border:1px solid rgba(60,184,120,.2);color:var(--green)}.toast.error{background:rgba(224,85,106,.1);border:1px solid rgba(224,85,106,.2);color:var(--red)}@keyframes toastIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
@media(max-width:768px){.plan-stats{grid-template-columns:repeat(2,1fr)}.insights-grid{grid-template-columns:1fr}.chat,.input-area{padding-left:12px;padding-right:12px}}
</style>
</head>
<body>
<div class="bg-layer"><div class="bg-orb bg-orb-1"></div><div class="bg-orb bg-orb-2"></div><div class="bg-orb bg-orb-3"></div></div>
<div class="app">
<header class="header"><div class="logo"><div class="logo-diamond">&#9670;</div><div class="logo-text">Smart<span class="logo-highlight">Route</span> Agent</div></div><div class="header-badge">DeepSeek &middot; 6-Agent</div></header>
<div class="chat" id="chat">
<div class="welcome" id="welcome"><div class="welcome-icon">&#8962;</div><div class="welcome-title">探索你的专属旅程</div><div class="welcome-sub">用自然语言描述出行计划，AI 将为你生成含 UGC 洞察与个性化推荐的完整路线方案，支持实时调整。</div>
<div class="welcome-chips"><div class="welcome-chip" data-query="明天带父母去西湖玩，妈妈腿脚不太好，预算500吃杭帮菜">&#128106; 家庭出游·西湖</div><div class="welcome-chip" data-query="周六和女朋友约会，想去杭州西湖边浪漫一点的地方，吃顿好的，预算300">&#128150; 情侣约会</div><div class="welcome-chip" data-query="周末一个人逛杭州，喜欢小众景点和文化体验，不想排队，预算200">&#127748; 小众探索</div></div></div></div>
<div class="input-area"><div class="input-wrapper"><textarea class="chat-input" id="chatInput" rows="1" placeholder="描述你的出行需求，或对方案提出调整..."></textarea><button class="send-btn" id="sendBtn" onclick="sendMessage()">&#8593;</button></div></div></div>
<script>
const chat=document.getElementById('chat'),input=document.getElementById('chatInput'),sendBtn=document.getElementById('sendBtn');
let sessionId='sess_'+Date.now(),isProcessing=false,currentStage=null,streamTextEl=null,hasActivePlan=false;
document.querySelectorAll('.welcome-chip').forEach(c=>c.addEventListener('click',()=>{input.value=c.dataset.query;sendMessage()}));
input.addEventListener('input',()=>{input.style.height='auto';input.style.height=Math.min(input.scrollHeight,120)+'px'});
input.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage()}});
function scrollBottom(){setTimeout(()=>{chat.scrollTop=chat.scrollHeight},80)}
function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=String(s);return d.innerHTML}
function addUserMsg(text){document.getElementById('welcome')?.remove();const d=document.createElement('div');d.className='msg msg-user';d.innerHTML=`<div class="msg-avatar">&#128100;</div><div class="msg-bubble">${esc(text)}</div>`;chat.appendChild(d);scrollBottom()}
function addStageMsg(stage,label,text){document.getElementById('welcome')?.remove();if(currentStage&&currentStage!==stage)chat.querySelectorAll('.stage-dot:not(.done)').forEach(d=>d.classList.add('done'));currentStage=stage;const cls={intent:'intent',retrieval:'retrieval',ugc:'ugc',route:'route',presentation:'presentation'}[stage]||'intent';const d=document.createElement('div');d.className='msg msg-agent';d.id='stage-'+stage;d.innerHTML=`<div class="msg-avatar">&#9670;</div><div class="msg-content"><div class="stage-msg"><span class="stage-dot"></span><span class="stage-label ${cls}">${label}</span><span class="stage-text">${esc(text)}</span></div></div>`;chat.appendChild(d);scrollBottom()}
function addAgentCard(html){const d=document.createElement('div');d.className='msg msg-agent';d.innerHTML=`<div class="msg-avatar">&#9670;</div><div class="msg-content">${html}</div>`;chat.appendChild(d);scrollBottom()}
function makeIntentCard(intent){const items=[['意图',intent.intent_type||'—'],['城市',intent.spatial?.city||'—'],['日期',intent.temporal?.date||'—'],['时段',(intent.temporal?.start_time||'')+'-'+(intent.temporal?.end_time||'')],['人数',(intent.party?.size||'')+'人'],['构成',(intent.party?.composition||[]).join(',')||'—'],['预算','¥'+(intent.budget?.per_person||'')+'/人'],['偏好',(intent.preferences?.must_have||[]).concat(intent.preferences?.themes||[]).join(', ')||'—'],['置信度',((intent.confidence||0)*100).toFixed(0)+'%'],['推断',(intent.inferred_fields||[]).join(',')||'—'],];return `<div class="intent-card"><div class="intent-grid">${items.map(i=>`<div class="intent-item"><div class="key">${i[0]}</div><div class="val">${esc(i[1])}</div></div>`).join('')}</div></div>`}
function makePOIList(cs){if(!cs||!cs.length)return '';return `<div class="poi-list">${cs.slice(0,10).map(p=>`<div class="poi-chip"><span>${p.category?.includes('餐')?'🍽️':p.category?.includes('景')?'🏛️':p.category?.includes('茶')?'🍵':'📍'}</span><span class="poi-name">${esc(p.name)}</span><span class="poi-cat">${esc(p.category||'')}</span><span class="poi-rating">⭐${p.rating||'—'}</span></div>`).join('')}</div>`}
function makeInsightsGrid(eps){if(!eps||!eps.length)return'';const items=eps.slice(0,8).map(p=>{const h=(p.highlights||[]).slice(0,2).map(x=>'<div class="insight-high">✨ '+esc(x)+'</div>').join('');const w=(p.warnings||[]).slice(0,1).map(x=>'<div class="insight-warn">⚠️ '+esc(x)+'</div>').join('');return `<div class="insight-card"><div class="insight-header"><span class="insight-name">${esc(p.name)}</span><span class="insight-channel ${p.analysis_channel==='llm'?'llm':'nlp'}">${p.analysis_channel==='llm'?'DeepSeek':'NLP'}</span></div>${h}${w}</div>`}).join('');return `<div style="margin-top:8px"><div style="font-size:13px;font-weight:600;margin-bottom:8px;color:var(--text-secondary)">UGC 评论洞察 (${eps.length} 个 POI)</div><div class="insights-grid">${items}</div></div>`}
function makePlanCards(plans){if(!plans||!plans.length)return'';const L=['A','B','C'];return plans.map((p,i)=>{const s=p.summary||{};const tl=(p.timeline||[]).map(t=>{const r=t.why_for_you?`<div class="tl-reason">"${esc(t.why_for_you)}"</div>`:'';const w=t.queue_warning?`<div class="tl-warn">⚠ ${esc(t.queue_warning)}</div>`:'';return `<div class="tl-item"><div class="tl-dot"></div><div class="tl-time">${t.arrive_time||'—'} → ${t.leave_time||'—'}</div><div class="tl-poi">${esc(t.poi_name)}</div><div class="tl-cat">${esc(t.category||'')} · ¥${t.estimated_cost||0}</div>${r}${w}</div>`}).join('');return `<div class="plan-card"><div class="plan-header"><div class="plan-badge ${L[i].toLowerCase()}">方案 ${L[i]}</div><div class="plan-name">${esc(p.name)}</div></div><div class="plan-tagline">${esc(p.tagline||'')}</div><div class="plan-stats"><div class="plan-stat"><div class="v">¥${s.total_cost||0}/人</div><div class="l">总费用</div></div><div class="plan-stat"><div class="v">${s.total_distance_km||0}km</div><div class="l">步行</div></div><div class="plan-stat"><div class="v">${s.total_duration_h||0}h</div><div class="l">时长</div></div><div class="plan-stat"><div class="v">${s.poi_count||0}个</div><div class="l">POI</div></div></div><div class="plan-timeline">${tl}</div></div>`}).join('')}
function makeComparison(cmp){if(!cmp||!cmp.dimensions)return'';const dims=cmp.dimensions||[],plans=cmp.plans||{},ids=Object.keys(plans);if(!ids.length)return'';return `<div class="intent-card" style="margin-top:8px"><div style="font-size:13px;font-weight:600;margin-bottom:10px;color:var(--text-secondary)">方案对比</div><table class="compact-comp"><thead><tr><th>维度</th>${ids.map(id=>`<th>${esc(id)}</th>`).join('')}</tr></thead><tbody>${dims.map(d=>`<tr><td style="color:var(--text-primary);font-weight:500">${esc(d)}</td>${ids.map(id=>`<td>${esc(plans[id]?.[d]||'—')}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`}
function makeHints(hs){if(!hs||!hs.length)return'';return `<div class="hints-row">${hs.map(h=>`<span class="hint">💡 ${esc(h)}</span>`).join('')}</div>`}
function showTyping(){const d=document.createElement('div');d.className='typing';d.id='typing';d.innerHTML='<div class="msg-avatar" style="background:linear-gradient(135deg,var(--gold),#b8860b);width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px">&#9670;</div><div class="typing-dots"><span></span><span></span><span></span></div>';chat.appendChild(d);scrollBottom()}
function hideTyping(){const t=document.getElementById('typing');if(t)t.remove()}
function showToast(type,text){const t=document.createElement('div');t.className='toast '+type;t.textContent=text;document.body.appendChild(t);setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .3s';setTimeout(()=>t.remove(),300)},2500)}

async function sendMessage(){
  const query=input.value.trim();if(!query||isProcessing)return;
  isProcessing=true;sendBtn.disabled=true;input.value='';input.style.height='auto';currentStage=null;streamTextEl=null;
  chat.querySelectorAll('.stage-dot').forEach(d=>d.classList.remove('done'));addUserMsg(query);showTyping();
  try{
    const ep=hasActivePlan?'/api/v1/route/adjust/stream':'/api/v1/route/plan/stream';
    const resp=await fetch(ep,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({query,session_id:sessionId})});
    if(!resp.ok)throw new Error('HTTP '+resp.status);
    const reader=resp.body.getReader(),decoder=new TextDecoder();let buf='';
    while(true){const{done,value}=await reader.read();if(done)break;buf+=decoder.decode(value,{stream:true});const lines=buf.split('\n');buf=lines.pop()||'';for(const l of lines){if(l.startsWith('data: ')){const d=l.slice(6);if(d==='[DONE]'){hideTyping();finishFlow();return}try{handleSSE(JSON.parse(d))}catch(e){}}}}
  }catch(e){hideTyping();showToast('error','失败: '+e.message);addAgentCard('<div style="color:var(--red);font-size:13px">⚠ 规划遇到问题，请重试</div>')}
  isProcessing=false;sendBtn.disabled=false
}

function handleSSE(msg){hideTyping();switch(msg.type){
  case'status':handleStatus(msg);break;case'text':handleStreamText(msg.token);break;
  case'structured_meta':handleMeta(msg);break;case'structured':handleStructured(msg);break;
  case'clarification':handleClarify(msg);break;case'intent':handleIntentCard(msg.intent);break;
  case'candidates':handleCandidates(msg.candidates);break;case'insights':handleInsights(msg.enriched_pois);break;
}}
function handleStatus(msg){const m={intent:'Intent · 意图识别',retrieval:'Retrieval · POI召回',ugc:'UGC · 评论洞察',route:'Route · 路线规划',presentation:'Present · 方案生成',profile_retrieval:'Retrieval · POI召回'};addStageMsg(msg.stage,m[msg.stage]||msg.stage,msg.message)}
function handleStreamText(tk){if(!streamTextEl){const d=document.createElement('div');d.className='msg msg-agent';d.innerHTML='<div class="msg-avatar">&#9670;</div><div class="msg-content"><div id="stream-block" style="color:var(--text-secondary);font-size:14px;line-height:1.9;padding:8px 0"></div></div>';chat.appendChild(d);streamTextEl=document.getElementById('stream-block')}streamTextEl.textContent+=tk;scrollBottom()}
function handleMeta(msg){if(msg.summary)addAgentCard(`<div style="font-size:15px;font-weight:600;color:var(--text-primary);padding:8px 0">${esc(msg.summary)}</div>`)}
function handleClarify(msg){addAgentCard(`<div style="font-size:14px;color:var(--gold-light)">🤔 ${esc((msg.questions||['请补充信息']).join('；'))}</div>`)}
function handleIntentCard(i){if(i)addAgentCard(makeIntentCard(i))}
function handleCandidates(cs){if(cs&&cs.length)addAgentCard(makePOIList(cs))}
function handleInsights(eps){if(eps&&eps.length)addAgentCard(makeInsightsGrid(eps))}
function handleStructured(msg){hasActivePlan=true;const plans=msg.plans||[],cmp=msg.plan_comparison,hints=msg.adjustable_hints||[];let h='';if(plans.length){h+='<div style="font-size:13px;font-weight:600;color:var(--text-secondary);margin:8px 0 4px">📋 路线方案</div>'+makePlanCards(plans)}if(cmp)h+=makeComparison(cmp);if(hints.length)h+=makeHints(hints);h+='<div style="font-size:12px;color:var(--text-muted);margin-top:12px;padding:10px;background:rgba(255,255,255,.015);border-radius:8px;border:1px solid var(--border-subtle)">💬 <b>对方案不满意？</b>在下方输入框中提出调整要求</div>';if(h)addAgentCard(h);chat.querySelectorAll('.stage-dot').forEach(d=>d.classList.add('done'));showToast('success',`生成 ${plans.length} 套方案`)}
function finishFlow(){isProcessing=false;sendBtn.disabled=false;chat.querySelectorAll('.stage-dot').forEach(d=>d.classList.add('done'));input.placeholder=hasActivePlan?'对方案提出调整...':'描述你的出行需求...'}
</script>
</body>
</html>
